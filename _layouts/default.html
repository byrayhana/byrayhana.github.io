<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }} — {{ site.tagline }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author }}">
  <!-- Open Graph -->
  <meta property="og:title" content="{{ site.title }} — {{ site.tagline }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="#top" class="brand">RB</a>
      <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#work">Work</a>
        <a href="#publications">Publications</a>
        <a href="#experience">Experience</a>
      </nav>
    </div>
  </header>

  <main id="top">
    {{ content }}
  </main>

  <footer class="footer">
    <div class="wrap">
      <p>
        <a href="https://github.com/{{ site.github_user }}">GitHub</a> ·
        <a href="https://huggingface.co/{{ site.huggingface_user }}">Hugging&nbsp;Face</a> ·
        <a href="mailto:{{ site.email }}">Email</a>
      </p>
      <p class="muted">© {{ 'now' | date: "%Y" }} {{ site.author }} · Built with Jekyll, hosted on GitHub Pages.</p>
    </div>
  </footer>
</body>
</html>
